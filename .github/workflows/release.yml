name: Release & Publish

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    name: Test → Build → Release → Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Version bump ────────────────────────────────
      - name: Determine next version
        id: version
        run: |
          PACKAGE_NAME=$(jq -r .name package.json)
          PKG_VERSION=$(jq -r .version package.json)

          # Get latest version from npm; fall back to package.json version
          NPM_LATEST=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          # Use whichever is higher: npm or package.json
          # Compare by sorting semver and taking the last
          LATEST=$(printf '%s\n%s' "$NPM_LATEST" "$PKG_VERSION" | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          echo "npm-latest=$NPM_LATEST" >> "$GITHUB_OUTPUT"

          # Bump patch: 0.1.1 → 0.1.2
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "### Version: $LATEST → $NEXT" >> "$GITHUB_STEP_SUMMARY"

      - name: Update package.json version
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          jq --arg v "$NEXT" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Updated package.json to $NEXT"

      # ── Quality gates ───────────────────────────────
      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      # ── Build ───────────────────────────────────────
      - name: Build
        run: bun run build

      # ── Commit version bump ─────────────────────────
      - name: Commit & tag
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${NEXT}" || echo "No changes to commit"
          git tag "v${NEXT}"
          git push origin main --tags

      # ── GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.next }}
          name: v${{ steps.version.outputs.next }}
          generate_release_notes: true

      # Trigger publish.yml explicitly (GITHUB_TOKEN tag pushes don't trigger other workflows)
      - name: Trigger publish workflow
        run: gh workflow run publish.yml --ref "v${{ steps.version.outputs.next }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          PACKAGE_NAME=$(jq -r .name package.json)
          echo "### ✅ Released ${PACKAGE_NAME}@${NEXT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${NEXT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm publish will be triggered by publish.yml via the v${NEXT} tag" >> "$GITHUB_STEP_SUMMARY"
